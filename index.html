    // 清理文字：轉換全形直排引號為標準引號，並清理周圍不自然的空白
    function cleanText(text) {
        return text
            .replace(/﹁/g, "「")
            .replace(/﹂/g, "」")
            .replace(/『/g, "『")
            .replace(/』/g, "』")
            .replace(/「\s+/g, "「")
            .replace(/\s+」/g, "」")
            .replace(/『\s+/g, "『")
            .replace(/\s+』/g, "』");
    }

    // 初始化渲染
    function renderTable() {
        const selectedIdiom = document.getElementById("idiomSelect").value;
        const tbody = document.getElementById("corpusBody");
        const statsDisplay = document.getElementById("statsDisplay");
        tbody.innerHTML = "";

        let matchCount = 0;
        compressedData.forEach((row) => {
            const parts = row.split('|');
            if (parts.length === 5) {
                // 套用引號清理函數
                const left = cleanText(parts[0]);
                const keyword = parts[1];
                const right = cleanText(parts[2]);
                const book = parts[3];
                const year = parts[4];

                if (selectedIdiom === "all" || keyword === selectedIdiom) {
                    matchCount++;
                    const posInfo = posDictionary[keyword] || "未知詞類";
                    
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td class="col-id">${matchCount}</td>
                        <td class="col-left">${left}</td>
                        <td class="col-keyword">
                            <div class="keyword-container">
                                ${keyword}
                                <span class="tooltip">${posInfo}</span>
                            </div>
                        </td>
                        <td class="col-right">${right}</td>
                        <td class="col-book">${book}</td>
                        <td class="col-year">${year}</td>
                    `;
                    tbody.appendChild(tr);
                }
            }
        });

        if (matchCount === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="empty-message">沒有符合條件的語料資料。</td></tr>`;
            statsDisplay.innerHTML = "";
        } else {
            statsDisplay.innerHTML = `符合筆數：<strong>${matchCount}</strong> 筆`;
        }
    }

    window.onload = renderTable;
</script>
